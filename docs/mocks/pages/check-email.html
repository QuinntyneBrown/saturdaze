<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Check your email — Saturdaze</title>
  <link rel="stylesheet" href="../styles/global.css" />
  <script type="module" src="../app.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
      min-height: 100svh;
    }
    .auth-shell { width: 100%; max-width: 440px; display: grid; gap: 24px; }

    .brand {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      color: var(--sd-ink-soft);
      font-size: var(--sd-fs-xs);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: var(--sd-fw-semibold);
    }
    .brand .mark {
      width: 28px; height: 28px; border-radius: 8px;
      background:
        radial-gradient(120% 120% at 20% 0%, var(--sd-primary-soft) 0%, transparent 60%),
        radial-gradient(120% 120% at 100% 100%, #FBEBC4 0%, transparent 60%),
        var(--sd-primary);
      box-shadow: var(--sd-shadow-1);
    }

    /* Generic post-send state — reused for both password reset and
       account verification. Centered to make the email address the focal
       point so the user immediately knows where to look. */
    .auth-card {
      background: var(--sd-surface);
      border: 1px solid var(--sd-line);
      border-radius: var(--sd-r-xl);
      padding: 36px 28px;
      box-shadow: var(--sd-shadow-2);
      text-align: center;
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    /* Soft badge holding the envelope icon. The accent color does the
       work of "something arrived for you" without resorting to confetti. */
    .badge {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: grid; place-items: center;
      background:
        radial-gradient(120% 120% at 30% 20%, var(--sd-primary-soft) 0%, transparent 70%),
        var(--sd-bg-elev);
      color: var(--sd-primary);
      border: 1px solid var(--sd-primary-soft);
    }

    .auth-card h1 {
      font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin: 0;
    }
    .auth-card .sub {
      color: var(--sd-ink-soft);
      font-size: 14px;
      line-height: 1.55;
      margin: 0;
      max-width: 320px;
    }
    .auth-card .sub strong { color: var(--sd-ink); font-weight: 600; }

    .helper {
      margin-top: 6px;
      font-size: 13px;
      color: var(--sd-ink-soft);
    }
    .helper a {
      color: var(--sd-primary); text-decoration: none; font-weight: 600;
    }
    .helper a:hover { text-decoration: underline; }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .foot {
      text-align: center; font-size: 12px; color: var(--sd-ink-faint);
    }
    .foot a { color: var(--sd-ink-soft); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-shell">

    <div class="brand">
      <span class="mark"></span>
      Saturdaze
    </div>

    <div class="auth-card">
      <div class="badge">
        <sd-icon name="mail" size="32"></sd-icon>
      </div>

      <h1>Check your email</h1>
      <p class="sub">
        We sent a link to <strong>you@example.com</strong>. Click it to finish setting up your account — it expires in 30 minutes.
      </p>

      <div class="button-row">
        <sd-button variant="secondary" size="sm">
          <sd-icon slot="leading" name="refresh" size="14"></sd-icon>
          Resend
        </sd-button>
        <sd-button variant="ghost" size="sm">
          Open mail app
        </sd-button>
      </div>

      <div class="helper">
        Wrong address? <a href="signup.html">Use a different one</a>
      </div>
    </div>

    <div class="foot">
      <a href="login.html">← Back to sign in</a>
    </div>

  </div>
</body>
</html>
