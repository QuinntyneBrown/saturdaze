<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Check your email — Saturdaze</title>
  <link rel="stylesheet" href="../styles/global.css" />
  <script type="module" src="../app.js"></script>
  <style>
    /* === Variant of check-email.html (BUG-009 / M-S3) =====================
       Renders when /check-email is opened without any email context — e.g.
       the user navigated directly, or the page was reached after the
       app was restarted and router state was lost.

       Rather than show a fake "we sent the link" success (which is what
       the deployed app currently does), this state asks the user for an
       email and keeps Resend disabled until they enter one. The copy
       leans honest: I don't know where to send it yet.
       ===================================================================== */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .auth-shell { width: 100%; max-width: 440px; display: grid; gap: 24px; }

    .brand {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      color: var(--sd-ink-soft);
      font-size: var(--sd-fs-xs);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: var(--sd-fw-semibold);
    }
    .brand .mark {
      width: 28px; height: 28px; border-radius: 8px;
      background:
        radial-gradient(120% 120% at 20% 0%, var(--sd-primary-soft) 0%, transparent 60%),
        radial-gradient(120% 120% at 100% 100%, #FBEBC4 0%, transparent 60%),
        var(--sd-primary);
      box-shadow: var(--sd-shadow-1);
    }

    .auth-card {
      background: var(--sd-surface);
      border: 1px solid var(--sd-line);
      border-radius: var(--sd-r-xl);
      padding: 32px 28px;
      box-shadow: var(--sd-shadow-2);
      text-align: center;
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    /* Same mail badge as check-email.html but in a quieter neutral tone —
       we haven't sent anything yet, so the visual "something arrived"
       energy is dialled back to "something is ready to be sent". */
    .badge {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: grid; place-items: center;
      background: var(--sd-bg-elev);
      color: var(--sd-ink-soft);
      border: 1px solid var(--sd-line);
    }

    .auth-card h1 {
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0;
    }
    .auth-card .sub {
      color: var(--sd-ink-soft);
      font-size: 14px;
      line-height: 1.55;
      margin: 0;
      max-width: 320px;
    }

    .input-row {
      width: 100%;
      display: grid;
      gap: 10px;
      text-align: left;
      margin-top: 4px;
    }

    .helper {
      margin-top: 2px;
      font-size: 13px;
      color: var(--sd-ink-soft);
    }
    .helper a {
      color: var(--sd-primary); text-decoration: none; font-weight: 600;
    }
    .helper a:hover { text-decoration: underline; }

    .foot {
      text-align: center; font-size: 12px; color: var(--sd-ink-faint);
    }
    .foot a { color: var(--sd-ink-soft); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-shell">

    <div class="brand">
      <span class="mark"></span>
      Saturdaze
    </div>

    <div class="auth-card">
      <div class="badge">
        <sd-icon name="mail" size="32"></sd-icon>
      </div>

      <h1>Where should I send the link?</h1>
      <p class="sub">
        Drop in the email on your account and I'll send a fresh sign-in link your way.
      </p>

      <div class="input-row">
        <sd-text-input
          label="Email"
          type="email"
          placeholder="you@example.com"
        ></sd-text-input>

        <sd-button size="lg" full>
          <sd-icon slot="leading" name="mail" size="16"></sd-icon>
          Send me a link
        </sd-button>
      </div>

      <div class="helper">
        Don't have an account yet? <a href="signup.html">Create one</a>
      </div>
    </div>

    <div class="foot">
      <a href="login.html">← Back to sign in</a>
    </div>

  </div>
</body>
</html>
