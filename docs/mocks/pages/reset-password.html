<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Set a new password — Saturdaze</title>
  <link rel="stylesheet" href="../styles/global.css" />
  <script type="module" src="../app.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .auth-shell { width: 100%; max-width: 420px; display: grid; gap: 24px; }

    .brand {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      color: var(--sd-ink-soft);
      font-size: var(--sd-fs-xs);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: var(--sd-fw-semibold);
    }
    .brand .mark {
      width: 28px; height: 28px; border-radius: 8px;
      background:
        radial-gradient(120% 120% at 20% 0%, var(--sd-primary-soft) 0%, transparent 60%),
        radial-gradient(120% 120% at 100% 100%, #FBEBC4 0%, transparent 60%),
        var(--sd-primary);
      box-shadow: var(--sd-shadow-1);
    }

    .auth-card {
      background: var(--sd-surface);
      border: 1px solid var(--sd-line);
      border-radius: var(--sd-r-xl);
      padding: 28px 24px;
      display: grid;
      gap: 18px;
      box-shadow: var(--sd-shadow-2);
    }
    .auth-card h1 {
      font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0;
    }
    .auth-card .sub {
      margin: -10px 0 0; color: var(--sd-ink-soft); font-size: 14px; line-height: 1.5;
    }

    /* Inline checklist that mirrors the password rules the backend will
       enforce. Shown statically here; in implementation each row flips
       to its 'met' state as the user types. */
    .rules {
      display: grid;
      gap: 6px;
      padding: 12px 14px;
      background: var(--sd-bg-elev);
      border: 1px solid var(--sd-line);
      border-radius: var(--sd-r-md);
      font-size: 13px;
      color: var(--sd-ink-soft);
    }
    .rules .rule {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rules .rule.met { color: var(--sd-ink); }
    .rules .rule.met sd-icon { color: var(--sd-accent); }
    .rules .rule sd-icon { color: var(--sd-ink-faint); }

    .foot {
      text-align: center; font-size: 12px; color: var(--sd-ink-faint);
    }
    .foot a { color: var(--sd-ink-soft); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-shell">

    <div class="brand">
      <span class="mark"></span>
      Saturdaze
    </div>

    <div class="auth-card">
      <div>
        <h1>Set a new password</h1>
        <p class="sub">Pick something only you would type. We'll sign you straight in after.</p>
      </div>

      <sd-text-input
        label="New password"
        type="password"
        placeholder="At least 8 characters"
      ></sd-text-input>

      <sd-text-input
        label="Confirm password"
        type="password"
        placeholder="Type it again"
      ></sd-text-input>

      <div class="rules">
        <div class="rule met">
          <sd-icon name="check" size="14"></sd-icon>
          At least 8 characters
        </div>
        <div class="rule met">
          <sd-icon name="check" size="14"></sd-icon>
          A number or symbol
        </div>
        <div class="rule">
          <sd-icon name="check" size="14"></sd-icon>
          Both fields match
        </div>
      </div>

      <sd-button size="lg" full>
        <sd-icon slot="leading" name="key" size="16"></sd-icon>
        Update password
      </sd-button>
    </div>

    <div class="foot">
      <a href="login.html">← Back to sign in</a>
    </div>

  </div>
</body>
</html>
