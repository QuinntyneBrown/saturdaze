<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Food — Saturdaze</title>
  <link rel="stylesheet" href="../styles/global.css" />
  <script type="module" src="../app.js"></script>
  <style>
    /* === Variant of restaurants.html (BUG-036 / M-S15) ====================
       Renders after the current user has cast votes. The Yes / No
       buttons on the sd-vote-row component already support the active
       state visually; this mock simply uses real "I voted" data so the
       state is reviewable.

       Active votes use sd-accent-soft (Yes) or sd-warn-soft (No). The
       inactive sibling is dimmed but still tappable so the user can
       change their mind.

       The current user is Quinn — Quinn's row reads as "you voted",
       the others as "they've voted (or haven't)".
       ===================================================================== */
    .you-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--sd-primary);
      background: var(--sd-primary-soft);
      padding: 2px 8px;
      border-radius: var(--sd-r-pill);
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="sd-frame">

    <sd-top-bar title="Food" back>
      <sd-icon-button slot="trailing" icon="refresh" label="Refresh picks"></sd-icon-button>
    </sd-top-bar>

    <div style="padding: 0 var(--sd-app-pad-x);">
      <h2 style="font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 8px 0 4px;">Saturday food</h2>
      <p style="color: var(--sd-ink-soft); font-size: 14px; margin: 0 0 16px;">You've voted on two — Sara's seen the picks but hasn't weighed in yet.</p>
    </div>

    <sd-tag-group>
      <sd-chip tone="primary">Lunch</sd-chip>
      <sd-chip>Dinner</sd-chip>
      <sd-chip tone="accent">Wife-approved only</sd-chip>
      <sd-chip tone="sky">&lt; 15 min</sd-chip>
      <sd-chip tone="leaf">Patio</sd-chip>
    </sd-tag-group>

    <sd-section title="Top pick for lunch" subtitle="You said yes — waiting on Sara">
      <sd-restaurant-card
        name="La Marina"
        style="Mediterranean · Patio"
        near="Milton, 6 min from Terre Bleu"
        drive="6 min"
        wifeapproved
        icon="fork"
      >
        <sd-chip slot="chips" tone="primary">Top pick</sd-chip>
        <sd-vote-row slot="votes" name="Quinn" tone="primary" vote="up"></sd-vote-row>
        <sd-vote-row slot="votes" name="Sara"  tone="leaf"    vote="none"></sd-vote-row>
        <sd-vote-row slot="votes" name="Eli"   tone="sky"     vote="up"></sd-vote-row>
        <sd-vote-row slot="votes" name="Mae"   tone="sun"     vote="up"></sd-vote-row>
        <div slot="votes" style="display:flex; gap:8px; margin-top:14px;">
          <sd-button variant="secondary" size="sm" full>See menu</sd-button>
          <sd-button size="sm" full>
            <sd-icon slot="leading" name="lock" size="14"></sd-icon>
            Lock it in
          </sd-button>
        </div>
      </sd-restaurant-card>
    </sd-section>

    <sd-section title="Other strong picks">
      <div class="sd-card-grid">
        <sd-restaurant-card
          name="Symposium Café"
          style="Brunch · Family booths"
          near="Milton, 9 min from Terre Bleu"
          drive="9 min"
          wifeapproved
          icon="fork"
        >
          <sd-vote-row slot="votes" name="Quinn" tone="primary" vote="none"></sd-vote-row>
          <sd-vote-row slot="votes" name="Sara"  tone="leaf"    vote="up"></sd-vote-row>
          <sd-vote-row slot="votes" name="Eli"   tone="sky"     vote="none"></sd-vote-row>
          <sd-vote-row slot="votes" name="Mae"   tone="sun"     vote="up"></sd-vote-row>
        </sd-restaurant-card>

        <!-- The Sicilian — you voted "No". Sara voted "No" too. The card
             shows the consensus is forming against this pick without
             needing extra UI; the active states on the vote rows
             carry the signal. -->
        <sd-restaurant-card
          name="The Sicilian Sidewalk Café"
          style="Italian · Casual"
          near="Hwy back to Port Credit"
          drive="12 min"
          icon="fork"
        >
          <sd-vote-row slot="votes" name="Quinn" tone="primary" vote="down"></sd-vote-row>
          <sd-vote-row slot="votes" name="Sara"  tone="leaf"    vote="down"></sd-vote-row>
          <sd-vote-row slot="votes" name="Eli"   tone="sky"     vote="up"></sd-vote-row>
          <sd-vote-row slot="votes" name="Mae"   tone="sun"     vote="up"></sd-vote-row>
        </sd-restaurant-card>
      </div>
    </sd-section>

    <sd-section title="Sunday dinner" subtitle="After Rec Room — Square One area">
      <sd-restaurant-card
        name="Jack Astor's"
        style="Casual · Kids' menu"
        near="Square One"
        drive="2 min"
        wifeapproved
        icon="fork"
      >
        <sd-vote-row slot="votes" name="Quinn" tone="primary" vote="up"></sd-vote-row>
        <sd-vote-row slot="votes" name="Sara"  tone="leaf"    vote="up"></sd-vote-row>
        <sd-vote-row slot="votes" name="Eli"   tone="sky"     vote="up"></sd-vote-row>
        <sd-vote-row slot="votes" name="Mae"   tone="sun"     vote="up"></sd-vote-row>
      </sd-restaurant-card>
    </sd-section>

    <sd-bottom-nav active="home"></sd-bottom-nav>
  </div>
</body>
</html>
