name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: saturdaze-rg
  AZURE_WEBAPP_NAME: sd-api-uofnt2
  DOTNET_VERSION: '10.0.101'
  NODE_VERSION: '20'
  API_PROJECT: backend/src/Saturdaze.Api/Saturdaze.Api.csproj
  CLI_PROJECT: backend/src/Saturdaze.Cli/Saturdaze.Cli.csproj
  ANGULAR_DIST: frontend/dist/saturdaze/browser

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  api:
    name: Build & deploy API
    runs-on: ubuntu-latest
    outputs:
      api-deployed: ${{ steps.deploy.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish API
        run: |
          dotnet publish "${{ env.API_PROJECT }}" \
            -c Release \
            -o ./publish \
            --nologo

      - name: Zip publish output
        run: |
          cd publish
          zip -r ../api.zip .

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        id: deploy
        run: |
          az webapp deploy \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --src-path api.zip \
            --type zip \
            --async false

  migrate:
    name: Apply EF migrations
    runs-on: ubuntu-latest
    needs: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: saturdaze migrate
        env:
          CONN: ${{ secrets.SATURDAZE_CONNECTION }}
        run: |
          dotnet run --project "${{ env.CLI_PROJECT }}" -- migrate --connection "$CONN"

  web:
    name: Build & deploy frontend (SWA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Angular workspace deps
        working-directory: frontend
        run: npm ci

      - name: ng build (production)
        working-directory: frontend
        run: npx ng build saturdaze --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: ${{ env.ANGULAR_DIST }}
          skip_app_build: true
          skip_api_build: true
