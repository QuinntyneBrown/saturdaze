@if (label()) { <label>{{ label() }}</label> }
<input
  [attr.type]="type()"
  [value]="internalValue()"
  [attr.placeholder]="placeholder()"
  [attr.autocomplete]="autocomplete() || null"
  [attr.name]="name() || null"
  [disabled]="disabled()"
  (input)="handleInput($event)"
  (blur)="handleBlur()"
/>
@if (hint()) { <div class="hint">{{ hint() }}</div> }
