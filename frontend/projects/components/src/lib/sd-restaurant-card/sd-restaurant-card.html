<div class="card">
  <div class="head">
    <div class="head-icon"><sd-icon [name]="icon()" [size]="22" /></div>
    <div class="head-body">
      <div class="name">{{ name() }}</div>
      <div class="style">
        {{ styleAttr() }}@if (near()) { · {{ near() }} }
      </div>
      <div class="meta">
        @if (drive()) {
          <sd-chip tone="sky"><sd-icon name="car" [size]="12" /> {{ drive() }}</sd-chip>
        }
        @if (wifeapproved()) {
          <sd-chip tone="accent"><sd-icon name="heart" [size]="12" /> Wife-approved</sd-chip>
        }
        <ng-content select="[slot=chips]" />
      </div>
    </div>
  </div>
  <div class="votes">
    <div class="votes-label">Family vote</div>
    <ng-content select="[slot=votes]" />
  </div>
</div>
