<sd-auth-shell>
  <sd-auth-card>
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div>
        <h1>Reset your password</h1>
        <p class="sub">Enter the email on your account and we'll send you a link to set a new one.</p>
      </div>

      <sd-text-input
        label="Email"
        type="email"
        placeholder="you@example.com"
        formControlName="email"
      />

      <sd-button type="submit" size="lg" full [disabled]="submitting()">
        <sd-icon slot="leading" name="mail" [size]="16" />
        Send reset link
      </sd-button>

      <div class="alt-cta">
        Remembered it?
        <a routerLink="/login">Back to sign in</a>
      </div>
    </form>
  </sd-auth-card>

  <div slot="foot" class="foot">
    <a routerLink="/">← Back to home</a>
  </div>
</sd-auth-shell>
