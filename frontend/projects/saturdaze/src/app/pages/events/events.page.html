<sd-top-bar title="Local events" back>
  <a
    slot="trailing"
    routerLink="/events/submit"
    aria-label="Submit a new event"
    title="Submit a new event"
    class="events-header-action"
  >
    <sd-icon name="plus" [size]="18" />
  </a>
</sd-top-bar>

<div class="events-lede">
  <h2>{{ view().heading }}</h2>
  <p>{{ view().lede }}</p>
</div>

<sd-tag-group>
  @for (f of view().filters; track f.label) {
    <sd-chip [tone]="f.tone">{{ f.label }}</sd-chip>
  }
</sd-tag-group>

@if (myPending().length > 0) {
  <sd-section title="Your submissions">
    <div class="sd-card-grid">
      @for (e of myPending(); track e.id) {
        <sd-event-card
          [title]="e.title"
          [venue]="e.venue"
          [when]="e.when"
          [date-day]="e.dateDay"
          [date-mon]="e.dateMon"
        >
          <sd-chip slot="chips" tone="sun">Pending review</sd-chip>
        </sd-event-card>
      }
    </div>
  </sd-section>
}

@for (s of view().sections; track s.title) {
  <sd-section [title]="s.title">
    <div class="sd-card-grid">
      @for (e of s.events; track e.title) {
        <sd-event-card
          [title]="e.title"
          [venue]="e.venue"
          [when]="e.when"
          [drive]="e.drive ?? ''"
          [date-day]="e.dateDay"
          [date-mon]="e.dateMon"
          [tag]="e.tag ?? ''"
        />
      }
    </div>
  </sd-section>
}

<button
  type="button"
  class="events-fab"
  aria-label="Submit a new event"
  title="Submit a new event"
  (click)="openQuickAdd()"
>
  <sd-icon name="plus" [size]="24" />
</button>

<sd-bottom-nav active="activities" />
